<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>T7 — Personalizar Home | Spotify Redesign</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/telas/t7.css" />
</head>
<body>
  <div class="t7-frame">

    <!-- TOPBAR -->
    <header class="topbar t7-topbar" role="banner">
      <a href="t1.html" class="topbar__back icon-btn" aria-label="Voltar para a Home">
        <i data-lucide="chevron-left" aria-hidden="true"></i>
      </a>
      <h1 class="topbar__title">Personalizar Home</h1>
      <div class="topbar__actions">
        <button class="t7-save-btn" type="button" id="t7-save">Salvar</button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="t7-main" role="main">
      <p class="t7-subtitle">
        Mostre ou esconda seções da sua Home. Arraste para reordenar.
      </p>

      <ul class="t7-modules" id="t7-modules" aria-label="Lista de módulos da Home"></ul>

      <div class="t7-restore-wrap">
        <button class="t7-restore-btn" type="button" id="t7-restore">
          Restaurar padrão
        </button>
      </div>
    </main>

    <!-- BOTTOM NAV (V2 — 5 itens) -->
    <nav class="bottom-nav bottom-nav--5" aria-label="Navegação principal">
      <a href="t1.html" class="bottom-nav__item" aria-label="Início">
        <i data-lucide="house" aria-hidden="true"></i><span>Início</span>
      </a>
      <a href="t6.html" class="bottom-nav__item" aria-label="Descoberta">
        <i data-lucide="compass" aria-hidden="true"></i><span>Descoberta</span>
      </a>
      <a href="#" class="bottom-nav__item" aria-label="Buscar">
        <i data-lucide="search" aria-hidden="true"></i><span>Buscar</span>
      </a>
      <a href="t3.html" class="bottom-nav__item" aria-label="Sua biblioteca">
        <i data-lucide="library" aria-hidden="true"></i><span>Biblioteca</span>
      </a>
      <a href="t5.html" class="bottom-nav__item bottom-nav__item--profile" aria-label="Perfil">
        <span class="bottom-nav__avatar" aria-hidden="true">VT</span><span>Perfil</span>
      </a>
    </nav>

  </div>

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- SHARED + TELA -->
  <script src="../js/mock-data.js"></script>
  <script src="../js/telemetria.js"></script>
  <script src="../js/dom-utils.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/telas/t7.js"></script>
</body>
</html>
