<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>T5 — Configuracoes com busca | Spotify Redesign</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/telas/t5.css" />
</head>
<body>
  <div class="t5-frame">

    <!-- TOPBAR -->
    <header class="t5-topbar" role="banner">
      <a href="../index.html" class="t5-topbar__back" aria-label="Voltar para o menu de telas">
        <i data-lucide="chevron-left" aria-hidden="true"></i>
      </a>
      <h1 class="t5-topbar__title">Configurações</h1>
      <button class="t5-topbar__more" aria-label="Mais opções">
        <i data-lucide="more-vertical" aria-hidden="true"></i>
      </button>
    </header>

    <!-- BUSCA STICKY -->
    <div class="t5-search-sticky" role="search">
      <label class="t5-search-field" for="t5-search-input">
        <i data-lucide="search" class="t5-search-field__icon" aria-hidden="true"></i>
        <input
          id="t5-search-input"
          class="t5-search-field__input"
          type="search"
          inputmode="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Buscar em configurações"
          aria-label="Buscar em configurações"
          aria-controls="t5-settings-list"
        />
        <button
          class="t5-search-field__clear"
          type="button"
          aria-label="Limpar busca"
          hidden
        >
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </label>
      <p class="t5-search-status sr-only" aria-live="polite" id="t5-search-status"></p>
    </div>

    <!-- LISTA -->
    <main class="t5-main" role="main">
      <ul
        class="t5-settings-list"
        id="t5-settings-list"
        aria-label="Lista de configurações"
      ></ul>

      <!-- EMPTY STATE -->
      <div class="t5-empty" hidden role="status" aria-live="polite">
        <div class="t5-empty__icon" aria-hidden="true">
          <i data-lucide="search-x"></i>
        </div>
        <p class="t5-empty__title">Nada encontrado</p>
        <p class="t5-empty__msg">
          Nenhum resultado para "<span class="t5-empty__term"></span>". Sugira em
          <a href="#" class="t5-empty__link">ajuda</a>.
        </p>
      </div>

      <footer class="t5-foot">
        <p class="t5-foot__app">Spotify Redesign · v0.1 (protótipo IHC)</p>
        <p class="t5-foot__build">Build 2026.06.27</p>
      </footer>
    </main>

    <!-- OVERLAY DE DETALHE (placeholder) -->
    <div class="t5-detail" hidden role="dialog" aria-modal="true" aria-labelledby="t5-detail-title">
      <div class="t5-detail__backdrop" data-close></div>
      <section class="t5-detail__sheet">
        <header class="t5-detail__head">
          <button class="t5-detail__back" data-close aria-label="Fechar detalhe">
            <i data-lucide="chevron-left" aria-hidden="true"></i>
          </button>
          <h2 class="t5-detail__title" id="t5-detail-title">Detalhe</h2>
        </header>
        <div class="t5-detail__body">
          <p class="t5-detail__hint">
            (Tela de detalhe simplificada — só para demonstrar o comportamento de
            navegação para a configuração selecionada.)
          </p>
          <p class="t5-detail__current">
            Item: <strong class="t5-detail__current-name">—</strong>
          </p>
        </div>
      </section>
    </div>

  </div>

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>window.lucide && window.lucide.createIcons();</script>

  <!-- SHARED + TELA -->
  <script src="../js/mock-data.js"></script>
  <script src="../js/telemetria.js"></script>
  <script src="../js/dom-utils.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/telas/t5.js"></script>
</body>
</html>
