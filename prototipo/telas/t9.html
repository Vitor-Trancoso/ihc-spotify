<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>T9 — Social / Amigos | Spotify Redesign</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/telas/t9.css" />
</head>
<body>
  <div class="t9-frame">

    <!-- TOPBAR -->
    <header class="topbar t9-topbar" role="banner">
      <a href="../index.html" class="icon-btn t9-topbar__back" aria-label="Voltar">
        <i data-lucide="chevron-left" aria-hidden="true"></i>
      </a>
      <h1 class="topbar__title">Social</h1>
      <div class="topbar__actions">
        <button class="icon-btn" id="t9-find-friends" aria-label="Encontrar amigos">
          <i data-lucide="search" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <main class="t9-main" role="main">
      <p class="t9-subtitle">Veja o que seus amigos estão ouvindo</p>

      <!-- SEÇÃO: OUVINDO AGORA -->
      <section class="t9-section" aria-labelledby="t9-now-title">
        <div class="t9-section__head">
          <h2 class="t9-section__title" id="t9-now-title">Ouvindo agora</h2>
          <span class="t9-live-badge" aria-label="Ao vivo">
            <span class="t9-live-dot" aria-hidden="true"></span>
            AO VIVO
          </span>
        </div>
        <ul class="t9-listening" id="t9-listening" aria-label="Amigos ouvindo agora"></ul>
      </section>

      <!-- SEÇÃO: JAM SESSIONS -->
      <section class="t9-section" aria-labelledby="t9-jam-title">
        <div class="t9-section__head">
          <h2 class="t9-section__title" id="t9-jam-title">Jam Sessions ativas</h2>
        </div>
        <ul class="t9-jams" id="t9-jams" aria-label="Jam sessions ativas"></ul>
      </section>

      <!-- SEÇÃO: ÚLTIMAS 24H -->
      <section class="t9-section" aria-labelledby="t9-feed-title">
        <div class="t9-section__head">
          <h2 class="t9-section__title" id="t9-feed-title">Últimas 24h</h2>
        </div>
        <ul class="t9-feed" id="t9-feed" aria-label="Atividade das últimas 24 horas"></ul>
      </section>

      <!-- SEÇÃO: COMPARTILHAR MINHA SESSÃO -->
      <section class="t9-section" aria-labelledby="t9-share-title">
        <div class="t9-share-card">
          <div class="t9-share-card__icon" aria-hidden="true">
            <i data-lucide="radio"></i>
          </div>
          <div class="t9-share-card__info">
            <h3 class="t9-share-card__title" id="t9-share-title">Compartilhar minha sessão</h3>
            <p class="t9-share-card__desc">
              Permitir que amigos vejam o que você está ouvindo
            </p>
          </div>
          <button
            class="t9-toggle"
            id="t9-share-toggle"
            role="switch"
            aria-checked="true"
            aria-label="Compartilhar minha sessão"
          >
            <span class="t9-toggle__thumb" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <div class="t9-spacer" aria-hidden="true"></div>
    </main>

    <!-- BOTTOM NAV V2 (5 itens) -->
    <nav class="bottom-nav t9-bottom-nav" aria-label="Navegação principal">
      <a href="t1.html" class="bottom-nav__item" aria-label="Início">
        <i data-lucide="house" aria-hidden="true"></i><span>Início</span>
      </a>
      <a href="t6.html" class="bottom-nav__item" aria-label="Descoberta">
        <i data-lucide="compass" aria-hidden="true"></i><span>Descoberta</span>
      </a>
      <a href="#" class="bottom-nav__item" aria-label="Buscar">
        <i data-lucide="search" aria-hidden="true"></i><span>Buscar</span>
      </a>
      <a href="t3.html" class="bottom-nav__item" aria-label="Sua biblioteca">
        <i data-lucide="library" aria-hidden="true"></i><span>Biblioteca</span>
      </a>
      <a href="t5.html" class="bottom-nav__item bottom-nav__item--profile" aria-label="Perfil">
        <span class="bottom-nav__avatar" aria-hidden="true">VT</span><span>Perfil</span>
      </a>
    </nav>

  </div>

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- SHARED + TELA -->
  <script src="../js/mock-data.js"></script>
  <script src="../js/telemetria.js"></script>
  <script src="../js/dom-utils.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/telas/t9.js"></script>
</body>
</html>
